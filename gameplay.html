<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Game Play — Volleyball Tryouts</title>
<link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
<div class="app evaluator-app">
  <header class="top compact">
    <h1>Game Play<span class="header-coach" id="headerCoach"></span></h1>
    <div class="header-actions">
      <button type="button" class="menu-btn" id="menuBtn" aria-label="Menu" aria-haspopup="true" aria-expanded="false">⋮</button>
      <a class="back-link" href="index.html" style="color:#c3d0e0;">&larr; Skills</a>
      <div class="menu-panel" id="menuPanel" hidden>
        <label class="menu-label" for="coachSelect">Coach</label>
        <select id="coachSelect" aria-label="Coach">
          <option value="">Coach…</option>
        </select>
        <button type="button" class="menu-reset-btn" id="resetBtn">Reset This Page</button>
      </div>
    </div>
  </header>

  <div id="configBanner" class="banner" hidden>
    ⚠ Not connected to the Google Sheet yet. Deploy the Apps Script Web App
    and paste its URL into <code>config.js</code> — see README.md.
  </div>

  <div class="toast" id="toast"></div>

  <main class="evaluator-grid gp-main">
    <div class="col-players">
      <div class="court-columns">
        <div class="court-col">
          <div class="player-jog-label">Side 1</div>
          <div id="side1Rows" class="court-rows"></div>
        </div>
        <div class="court-col">
          <div class="player-jog-label">Side 2</div>
          <div id="side2Rows" class="court-rows"></div>
        </div>
      </div>

      <div class="player-jog-label">Find player</div>
      <div class="player-jog-wrap compact">
        <div class="player-jog" id="playerJog"></div>
        <div class="player-jog-highlight"></div>
      </div>
      <div class="court-add-row">
        <button type="button" id="addSide1Btn">+ Side 1</button>
        <button type="button" id="addSide2Btn">+ Side 2</button>
      </div>
    </div>

    <div class="score-rail">
      <button type="button" class="rail-btn rail-undo" id="undoBtn" disabled>UNDO</button>
      <button type="button" class="rail-btn rail-remove" id="removeBtn" disabled>REMOVE</button>
      <div class="active-player-mini" id="activePlayerLabel">Add players to the court</div>

      <div class="gp-grid">
        <button type="button" class="toggle rail-btn gp-plus" data-result="Service Ace">ACE<span class="pts">+1</span></button>
        <button type="button" class="toggle rail-btn gp-minus" data-result="Serve Error">SERVE ERR<span class="pts">−1</span></button>
        <button type="button" class="toggle rail-btn gp-plus" data-result="Serve Receive">RECEIVE<span class="pts">+1</span></button>
        <button type="button" class="toggle rail-btn gp-minus" data-result="Serve Receive Error">RCV ERR<span class="pts">−1</span></button>
        <button type="button" class="toggle rail-btn gp-plus" data-result="Attack Kill">KILL<span class="pts">+1</span></button>
        <button type="button" class="toggle rail-btn gp-minus" data-result="Attack Error">ATK ERR<span class="pts">−1</span></button>
        <button type="button" class="toggle rail-btn gp-minus gp-wide" data-result="Dig Error">DIG ERROR<span class="pts">−1</span></button>
        <button type="button" class="toggle rail-btn gp-plus" data-result="Block">BLOCK<span class="pts">+1</span></button>
        <button type="button" class="toggle rail-btn gp-minus" data-result="Block Error">BLK ERR<span class="pts">−1</span></button>
      </div>
    </div>
  </main>
</div>

<script src="config.js?v=4"></script>
<script src="app.js?v=4"></script>
<script src="gameplay.js?v=4"></script>
</body>
</html>
