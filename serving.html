<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Serving — Volleyball Tryouts</title>
<link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
<div class="app evaluator-app">
  <header class="top compact">
    <h1>Serving<span class="header-coach" id="headerCoach"></span></h1>
    <div class="header-actions">
      <button type="button" class="menu-btn" id="menuBtn" aria-label="Menu" aria-haspopup="true" aria-expanded="false">⋮</button>
      <a class="back-link" href="index.html" style="color:#c3d0e0;">&larr; Skills</a>
      <div class="menu-panel" id="menuPanel" hidden>
        <label class="menu-label" for="coachSelect">Coach</label>
        <select id="coachSelect" aria-label="Coach">
          <option value="">Coach…</option>
        </select>
        <button type="button" class="menu-reset-btn" id="resetBtn">Reset This Page</button>
      </div>
    </div>
  </header>

  <div id="configBanner" class="banner" hidden>
    ⚠ Not connected to the Google Sheet yet. Deploy the Apps Script Web App
    and paste its URL into <code>config.js</code> — see README.md.
  </div>

  <div class="quick-controls">
    <input type="text" inputmode="numeric" id="startNumberInput" placeholder="Start #" aria-label="Starting player number" />
    <button type="button" id="loadGroupBtn">Load</button>
  </div>

  <div class="toast" id="toast"></div>

  <main class="evaluator-grid">
    <div class="col-players">
      <div id="playerRows" class="rows-col"></div>

      <div class="player-jog-label">Find player</div>
      <div class="player-jog-wrap">
        <div class="player-jog" id="playerJog"></div>
        <div class="player-jog-highlight"></div>
      </div>
    </div>

    <div class="score-rail">
      <button type="button" class="rail-btn rail-undo" id="undoBtn" disabled>UNDO</button>
      <div class="active-player-mini" id="activePlayerLabel">Load a group</div>
      <div class="score-mini" id="scoreNum">–</div>

      <button type="button" class="toggle result rail-btn" id="btnMissed" data-result="Missed">MISS<span class="pts">0</span></button>
      <button type="button" class="toggle result velocity rail-btn" id="btnV1" data-result="Slow">Slow<span class="pts">&lt;30 · 1pt</span></button>
      <button type="button" class="toggle result velocity rail-btn" id="btnV2" data-result="Average">Average<span class="pts">30-35 · 2pt</span></button>
      <button type="button" class="toggle result velocity rail-btn" id="btnV3" data-result="Fast">Fast<span class="pts">&gt;35 · 3pt</span></button>
      <button type="button" class="toggle rail-btn" id="btnHitTarget" disabled>Target ✓<span class="pts">+1pt</span></button>
      <button type="button" class="toggle rail-btn" id="btnMissedTarget" disabled>Target ✗<span class="pts">+0</span></button>
    </div>
  </main>
</div>

<script src="config.js?v=2"></script>
<script src="app.js?v=2"></script>
<script src="serving.js?v=2"></script>
</body>
</html>
