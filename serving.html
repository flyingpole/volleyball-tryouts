<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Serving — Volleyball Tryouts</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <header class="top">
    <h1>Serving Evaluation</h1>
    <p><a class="back-link" href="index.html" style="color:#c3d0e0;">&larr; Skills</a></p>
  </header>

  <div id="configBanner" class="banner" hidden>
    ⚠ Not connected to the Google Sheet yet. Deploy the Apps Script Web App
    and paste its URL into <code>config.js</code> — see README.md.
  </div>

  <main>
    <div class="field">
      <label for="coachSelect">Coach</label>
      <select id="coachSelect">
        <option value="">Select coach…</option>
      </select>
    </div>

    <div class="field">
      <label for="startNumberInput">Evaluating players starting at #</label>
      <div class="coach-row">
        <input type="text" inputmode="numeric" id="startNumberInput" placeholder="e.g. 11" />
        <button type="button" id="loadGroupBtn">Load</button>
      </div>
    </div>

    <div class="field">
      <label>Players</label>
      <div id="playerRows"></div>
    </div>

    <div class="scoring-panel">
      <div class="active-player" id="activePlayerLabel">Load a player group above</div>

      <div class="btn-group cols-2">
        <button type="button" class="toggle result" id="btnMissed" data-result="missed">MISSED<span class="pts">0 pts</span></button>
        <button type="button" class="toggle result velocity" id="btnV1" data-result="under30">&lt;30 mph<span class="pts">1 pt</span></button>
        <button type="button" class="toggle result velocity" id="btnV2" data-result="30to35">30-35 mph<span class="pts">2 pt</span></button>
        <button type="button" class="toggle result velocity" id="btnV3" data-result="over35">&gt;35 mph<span class="pts">3 pt</span></button>
      </div>

      <button type="button" class="toggle" id="btnHitTarget" disabled>HIT TARGET<span class="pts">+1 pt</span></button>

      <div class="score-preview">
        <div class="num" id="scoreNum">0</div>
        <div class="label">Points this attempt</div>
      </div>

      <button type="button" class="log-btn" id="logBtn" disabled>Log Attempt</button>

      <div class="toast" id="toast"></div>
    </div>

    <div class="session-log">
      <strong>This session</strong>
      <ul id="sessionList"></ul>
    </div>
  </main>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script src="serving.js"></script>
</body>
</html>
